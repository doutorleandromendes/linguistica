<!DOCTYPE html>
<html lang="pt">
<head><meta charset="UTF-8"><style>
body { font-family: system-ui, sans-serif; background: transparent; padding: 0.5rem 0; margin: 0; }
.wrap { overflow-x: auto; }
svg text { font-family: system-ui, sans-serif; }
.legend { display: flex; gap: 14px; margin-top: 10px; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #5f5e5a; }
.dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.note { font-size: 11px; color: #888780; font-style: italic; margin-top: 8px; line-height: 1.5; }
</style></head>
<body>
<div class="wrap">
<svg viewBox="0 0 780 420" width="100%" xmlns="http://www.w3.org/2000/svg">

  <text x="390" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#4A1B0C">Proto-Indo-Europeu</text>
  <text x="390" y="36" text-anchor="middle" font-size="10" fill="#A0440F">*PIE — c. 4000–3500 a.C.</text>

  <text x="700" y="97" text-anchor="middle" font-size="9" fill="#7A1E40">sânscrito, hindi, persa...</text>

  <text x="20" y="145" text-anchor="middle" font-size="9" fill="#085041">português</text>
  <rect x="37" y="130" width="36" height="22" rx="3" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="55" y="145" text-anchor="middle" font-size="9" fill="#085041">espanhol</text>
  <rect x="72" y="130" width="36" height="22" rx="3" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="90" y="145" text-anchor="middle" font-size="9" fill="#085041">francês</text>
  <rect x="107" y="130" width="36" height="22" rx="3" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>

  <text x="160" y="145" text-anchor="middle" font-size="9" fill="#085041">romeno</text>

  <!-- GERMANIC children -->
  <line x1="220" y1="102" x2="220" y2="118" stroke="#CECBF6" stroke-width="0.7"/>

  <text x="245" y="145" text-anchor="middle" font-size="9" fill="#3C3489">sueco</text>

  <!-- BALTO-SLAVIC children -->
  <line x1="460" y1="102" x2="460" y2="118" stroke="#F5D89A" stroke-width="0.7"/>
  <line x1="415" y1="118" x2="505" y2="118" stroke="#F5D89A" stroke-width="0.7"/>

  <rect x="397" y="130" width="36" height="22" rx="3" fill="#FEF3E2" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="415" y="145" text-anchor="middle" font-size="9" fill="#633806">russo</text>
  <rect x="432" y="130" width="36" height="22" rx="3" fill="#FEF3E2" stroke="#EF9F27" stroke-width="0.5"/>

  <text x="390" y="218" text-anchor="middle" font-size="11" font-weight="500" fill="#5f5e5a">Línguas que NÃO descendem do PIE — não têm parentesco com as acima</text>
  <text x="390" y="235" text-anchor="middle" font-size="10.5" fill="#888780">Finlandês · Húngaro · Turco · Árabe · Hebraico · Japonês · Chinês · Suaíli · Navajo · Quéchua · Basco</text>
  <text x="390" y="250" text-anchor="middle" font-size="9.5" fill="#B4B2A9">(famílias urálica, turca, semítica, sino-tibetana, niger-congo, na-dene, quechuamara, isoladas...)</text>

  <line x1="50" y1="340" x2="730" y2="340" stroke="#d3d1c7" stroke-width="1"/>

  <line x1="80" y1="335" x2="80" y2="345" stroke="#F0997B" stroke-width="1.5"/>
  <text x="80" y="328" text-anchor="middle" font-size="9" fill="#F0997B">~4000 a.C.</text>
  <text x="80" y="358" text-anchor="middle" font-size="9" fill="#888780">PIE falado</text>
  <text x="80" y="370" text-anchor="middle" font-size="9" fill="#888780">(estepes pônticas?)</text>

  <line x1="200" y1="335" x2="200" y2="345" stroke="#B4B2A9" stroke-width="1.5"/>

  <text x="200" y="358" text-anchor="middle" font-size="9" fill="#888780">ramificação</text>
  <text x="200" y="370" text-anchor="middle" font-size="9" fill="#888780">em andamento</text>

  <line x1="330" y1="335" x2="330" y2="345" stroke="#B4B2A9" stroke-width="1.5"/>

  <text x="330" y="358" text-anchor="middle" font-size="9" fill="#888780">Rigveda (sânscrito)</text>
  <text x="330" y="370" text-anchor="middle" font-size="9" fill="#888780">1ª escrita IE</text>

  <line x1="460" y1="335" x2="460" y2="345" stroke="#B4B2A9" stroke-width="1.5"/>

  <text x="460" y="358" text-anchor="middle" font-size="9" fill="#888780">Lei de Grimm</text>
  <text x="460" y="370" text-anchor="middle" font-size="9" fill="#888780">ocorre (aprox.)</text>

  <text x="570" y="358" text-anchor="middle" font-size="9" fill="#888780">Latim clássico</text>

  <line x1="680" y1="335" x2="680" y2="345" stroke="#AFA9EC" stroke-width="1.5"/>
  <text x="680" y="328" text-anchor="middle" font-size="9" fill="#3C3489">1822</text>
  <text x="680" y="358" text-anchor="middle" font-size="9" fill="#3C3489">Grimm publica</text>
  <text x="680" y="370" text-anchor="middle" font-size="9" fill="#3C3489">a Lei</text>

</div>
<p class="note">O PIE nunca foi escrito — foi reconstruído pelo método comparativo. Ninguém sabe exatamente onde ou quando era falado, mas as hipóteses mais aceitas apontam para as estepes ao norte do Mar Negro (hipótese Kurgan), c. 4000–3500 a.C.</p>
